kind = "web"
previewPath = "/"
title = "DEX Trade"
version = "1.0.0"
id = "artifacts/dex"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23444

[services.development]
run = "pnpm --filter @workspace/dex run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dex", "run", "build" ]
publicDir = "artifacts/dex/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23444"
BASE_PATH = "/"
