# fly.toml app configuration for UNBOUND pair indexer
app = "ubt-pair-indexer"
primary_region = "sin"

[env]
  PORT = "3001"

[[services]]
  internal_port = 3001
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
